<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            display: flex;
            flex-direction: row;
            justify-content: center;
            width: 1000px;
            height: 100px;

        }

        .b,.b1,.b2,.b3 {
            width: 230px;
            height: 100px;
            background-color: green;
            color: black;

        }

        .b {
            opacity: 1;

        }

        .b1 {
            opacity: 0.7;
        }
        .b2 {
            opacity: 0.5;
        }
        .b3 {
            opacity: 0.3;
        }


    </style>
</head>
<body>

    <!-- 2)-->
    
    <div class="box">
        <div class="b">1</div>
        <div class="b1">2</div>
        <div class="b2">3</div>
        <div class="b3">4</div>

    </div>



</body>
</html>
