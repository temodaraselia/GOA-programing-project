<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 300px;
            height: 300px;
            background-color: red;
            border: 0px;
            animation-name: move;
            animation-duration: 3s;
            animation-iteration-count: infinite;

        }

        @keyframes move {
            0% {
                transform: translateX(50px);

            }
            20% {
                transform: translateX(100px);

            }
            40% {
                transform: translateX(150px);

            }
            60% {
                transform: translateX(200px);

            }
            80% {
                transform: translateX(250px);

            }
            100% {
                transform: translateX(300px);

            }
        }

    </style>
</head>
<body>

    <!-- 1)ახსენი რას აკეთებს CSS Animation და როგორ გამოიყენება @keyframes ანიმაციის შესაქმნელად.
    keyframes - საშუალებით ჩვენ შეგვიძლია ანიმაციის შექმნა და მას შეგვიძლია გავუწეროთ დრო,რაოდენობა.-->

    <!-- 2) შექმენი ანიმაცია, რომელიც ელემენტს ნელა გადაადგილებს მარცხნიდან მარჯვნივ 3 წამში-->
    
    <div></div>


</body>
</html>
