<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 300px;
            height: 300px;
            background-color: red;
            border: 0px;
            animation-name: color;
            animation-duration: 3s;
            animation-iteration-count: infinite;

        }

        @keyframes color {
            from {
                background-color: red;
            }

            to {
                background-color: blue;
            }

        }

    </style>
</head>
<body>

    <!-- 3) რა განსხვავებაა transition-სა და CSS Animation შორის? მოიყვანე მაგალითები
    transition ჩვენ უბრალოდ ანიმაციის სიჩქარეს ვწერთ და Css animation ჩვენ მაგ ანიმაციას ყველანაირად ვაკონტროლებთ.-->

    <!-- 4) დაწერე @keyframes, რომელიც ელემენტს ფერს უცვლის წითლიდან ლურჯამდე-->

    <!-- 5) როგორ მუშაობს animation-duration, animation-delay და animation-iteration-count? განმარტე თითოეული
    duration - არის ანიმაციის დრო, delay - დროს რის შემდეგაც ანიმაცია დაიწყება, count - რამდენჯერ განმეორდეს-->

    <!-- 6) ახსენი რას აკეთებს CSS Media Queries და რატომ არის მნიშვნელოვანი responsive დიზაინშ
    Css Media Queries - მნიშვნელოვანი იმიტომ არის რომ ჩვენ გვეხმარება საიტი გავხადოთ ხელმისაწვდომი სხვა მოწყობილებებისთვის ანუ სხვა მოწყობილობაზე ელემენტებს სხვა ზომები ჰქონდეს.-->
    <div></div>
    
</body>
</html>
