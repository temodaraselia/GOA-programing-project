<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a {
            color: rgb(6, 232, 6);
            transition: all 1s;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            font-size: 30px;
        }

        a:hover {
            background-color: yellow;
            color: black;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            transform: scale(1.1);
            
        }

        .div {
            display: flex;
            justify-content: center;
            position: relative;
            top: 200px;

        }


    </style>


</head>
<body>

    <!-- 4) შექმენით a თეგი, თავიდან ჰქონდეს მწვანე ფერის ტექსტი, მაუსზე მიტანისას ჰქონდეს ყვითელი ფერის უკანა ფონი და შავი ფერის ტექსტი, 
    გადასვლა იყოს "ადამიანური", გამოიყენეთ ის სტილი რაც ახლა ავხსენით-->

    <div class="div">
    <a href="google.com">Google</a>

    </div>

    <!-- 5) რას აკეთებს :focus ფსეუდო კლასი
       როდესაც ლინკს ვაჭერთ იგი აკეთებს ფოკუსირებას ანუ რაღაც სტილს უცვლის დაჭერის დროს-->

</body>
