<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=favorite" />
    <style>
        button {
            background-color: white;
            border: 2px solid rgb(0, 149, 255);
            color: rgb(0, 149, 255);
            border-radius: 10px;
            width: 200px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 25px;
            transition: 0.3s;

        }

        button:hover {
            color: white;
            background-color:  rgb(0, 149, 255);
            box-shadow: 5px 5px 7px rgb(6, 0, 174);
            transform: scale(1.1);

        }

        .div {
            display: flex;
            justify-content: center;
            position: relative;
            top: 200px;

        }

    </style>


</head>
<body>




<div class="div">

<button> <span class="material-symbols-outlined">favorite</span>       Likes  <span>2</span> </button>

</div>
    
</body>
</html>
