<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button {
            color: red;
            background-color: black;
            border-radius: 10px;
            border: 0px;
            box-shadow: 5px 5px 7px red;
            font-size: 50px;
            transition: all 0.3s;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            

        }

        button:hover {
            color: black;
            background-color: red;
            border: 1px solid black;
            box-shadow:  5px 5px 7px black;
            transform: scale(1.1);
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;

        }

        .div {
            display: flex;
            justify-content: center;
            position: relative;
            top: 200px;

        }

    </style>

</head>
<body>
    <!-- გასტილეთ ღილაკი: დაჭერამდე იყოს წითელი ფერის, მაუსზე მიტანის დროს მიეცით 
    ყვითელი ფერის უკანა ფონი, დაჭერის დროს კი უკანა ფონი გახდეს ღია ლურჯი ფერის და ტექსტი მუქი ლურჯი ფერის-->
<div class="div">
    <button>Click Me</button>

</div>


    
</body>
</html>
