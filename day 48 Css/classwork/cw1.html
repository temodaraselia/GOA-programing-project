<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=person" />
    <style>
        button {
            color: white;
            background-color: rgb(5, 109, 244);
            border-radius: 10px;
            border: 0px;
            font-size: 25px;
            align-items: center;
            gap: 10px;
            width: 200px;
            height: 50px;
            display: flex;
            justify-content: center;
            transition: 0.3s;

        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 5px 5px 7px navy;

        }

        .div {
            display: flex;
            justify-content: center;
            position: relative;
            top: 200px;

        }



    </style>

</head>
<body>

<div class="div">

<button> <span class="material-symbols-outlined"> person</span> Sign up</button>

</div>
    
</body>
</html>
