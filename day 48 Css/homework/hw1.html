<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_forward_ios" />
    <style>
        .box {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            align-items: center;

        }

        button {
            color: white;
            background: linear-gradient(to right,rgb(240, 5, 162),orange);
            font-size: 20px;
            border-radius: 35px;
            border: 0px;
            width: 170px;
            height: 40px;
            display: flex;
            align-items: center;
            box-shadow: 5px 5px 7px rgb(205, 33, 61);
            transition: 0.3s;

        }
        button:hover {
            transform: scale(1.1);
            box-shadow: 5px 5px 5px orange;

        }





    </style>
</head>
<body>


<div class="box">


<button>READ MORE <span class="material-symbols-outlined">arrow_forward_ios</span></button>

</div>
    
</body>
</html>
