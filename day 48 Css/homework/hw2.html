<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=glass_cup" />
 
    <style>
        .container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 20px;

        }

        .box {
            display: flex;
            flex-direction: row;
            align-items: center;
            
        }

        button {
            display: flex;
            flex-direction: row;
            align-items: center;
            color: blue;
            background-color: rgba(173, 216, 230, 0.554);
            border-radius: 15px;
            border: 0px;
            font-size: 15px;
            max-width: max-content;
            height: 40px;
            padding-left: 15px;
            padding-right: 15px;
            transition: 0.5s;

        }

        button:hover {
            box-shadow: 5px 5px 7px navy;
            transform: scale(1.1);
            border: solid 1px navy;


        }


    </style>
</head>
<body>

<div class="container">

<div class="box">

<button>Food & Beverages <span class="material-symbols-outlined">glass_cup</span></button>

</div>


<div class="box">

<button>Shopping <img src="local_mall_24dp_0000F5_FILL0_wght400_GRAD0_opsz24.png" alt="" width="30px" height="15px"></button>


</div>


<div class="box">

<button>Work  <img src="work_24dp_0000F5_FILL0_wght400_GRAD0_opsz24.png" alt=""></button>


</div>

</div>

    
</body>
</html>
