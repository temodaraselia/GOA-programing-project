<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :is(div){
            color: blue;
        }

    </style>
</head>
<body>

    <!-- 1) გაქვთ სათაურები: h1, h2 და h3. დაწერეთ ერთი მოკლე სელექტორი :is()-ის გამოყენებით, რომელიც სამივეს ერთდროულად გაალურჯებს, ისე რომ სათითაოდ ჩამოწერა არ დაგჭირდეთ.-->
    

<div>
<h1>Hello</h1>
<h2>Hello</h2>
<h3>Hello</h3>
</div>

</body>
</html>
