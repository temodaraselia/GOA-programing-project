<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :is(header,main,footer) :is(p) {
            color: green;
        }

    </style>
</head>
<body>

    <!-- 3) დაწერეთ სელექტორი, რომელიც შეცვლის ტექსტის ფერს ნებისმიერ p თეგზე, რომელიც მოთავსებულია header-ში, main-ში ან footer-ში. გამოიყენეთ :is().-->

    <header>
        <h1>Hello</h1>
        <p>Hello</p>
    </header>

    <main>
        <h1>Hello</h1>
        <p>Hello</p>
    </main>

    <footer>
        <h1>Hello</h1>
        <p>Hello</p>
    </footer>

</body>
</html>
