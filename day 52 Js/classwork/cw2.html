<body>

    <!-- 2) პირობა:შექმენი პროგრამა,რომელიც ქულის მიხედვით განსაზღვრავს შეფასებას: 90 ზე მეტი ("A") - ფრიადი 80-89 ("B")  
    ძალიან ცუდი შედეგი 40 ზე ნაკლები ("F") ცვლადის სახელი რაც თქვენ გაგიხარდებათ და ინფორმაცია ცვლადში იყოს 67 -->
    

    <script>
        let score = 67;

        if (score >= 90){
            console.log("A")
        } else if (score >=80 && score <89){
            console.log("B")
        } else if (score <= 40){
            console.log("F")
        } else if (score <80 && score >40){
            console.log('C')
        }


    </script>


</body>
