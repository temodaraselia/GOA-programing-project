<!-- 1) პირობა: დაწერე პროგრამა,რომელიც ამოწმებს მომხმარებლის ასაკს.თუ ასაკი 18-ზე მეტია ან ტოლია,გამოიტანოს 
"შენ შეგიძლია ხმის მიცემა" ,თუ ნაკლებია "შენ ჯერ არ შეგიძლია ხმის მიცემა".-->

    <script>

        let age = 18;

        if (age >= 18){
            console.log("შენ შეგიძლია ხმის მიცემა")
        } else { console.log("შენ ჯერ არ შეგიძლია ხმის მიცემა")}




    </script>
