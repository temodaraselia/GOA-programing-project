<body>

    <!-- 3) პირობა: შექმენი პროგრამა  რომელიც ამოწმებს ამინდის მდგომარეობას ტემპერატურის მიხედვით: 30 C და მეტი  
    -"ძალიან ცხელა ,ფრთხილად იყავით"  20C დან 29C მდე -"კარგი ამინდია" 10C  დან 19C მდე - "ცივა თბილად  ჩაიცვი" 
    10C  ზე ნაკლები - "ძალიან ცივა სახლში დარჩი "-->


    <script>
    
    let temp = 30;
    if ( temp >= 30){
        console.log("ძალიან ცხელა ,ფრთხილად იყავით")
    } else if ( temp >= 20 && temp <= 29){
        console.log("კარგი ამინდია")
    } else if ( temp >= 10 && temp <= 19){
        console.log("ცივა თბილად  ჩაიცვი")
    } else {
        console.log("ძალიან ცივა სახლში დარჩი")
    }





    </script>

</body>
