    <!-- 2) სავარჯიშო 2: შესვლა სისტემაში (ლოგინი)
დავალება:
შექმენი პროგრამა, რომელიც ამოწმებს მომხმარებლის სახელს და პაროლს:
თუ სახელი "admin" და პაროლი "12345" → "მოგესალმებით, მიხარია რომ დაბრუნდით!"
თუ სახელი სწორია, მაგრამ პაროლი არასწორია → "პაროლი არასწორია!"
თუ სახელი არასწორია → "მომხმარებელი ვერ მოიძებნა!"-->


<script>

    let name = "admin";
    let password ="12345";

    if (name == "admin" && password == "12345"){
        console.log("მოგესალმებით, მიხარია რომ დაბრუნდით!")
    } else if (name == "admin" && password != "12345"){
        console.log("პაროლი არასწორია!")
    } else if (name != "admin" && password == "12345"){
        console.log("მომხმარებელი ვერ მოიძებნა!")
    } else {
        console.log("მონაცემები არასწორია")
    }







</script>
