    <!-- 1) სავარჯიშო 1: ასაკის შემოწმება
დავალება,ცვლადის სახელი -age 
მნიშვნელობა 27:
შექმენი პროგრამა, რომელიც ამოწმებს ასაკს და ბეჭდავს შესაბამის შეტყობინებას:
თუ ასაკი 18-ზე ნაკლებია → "შენ ჯერ არასრულწლოვანი  ხარ"
თუ ასაკი 18-დან 65-მდეა → "შენ სრულწლოვანი ხარ"
თუ ასაკი 65-ზე მეტია → "შენ პენსიონერი ხარ"-->


<script>

let age = 27;

if (age < 18){
    console.log("შენ ჯერ არასრულწლოვანი  ხარ")
} else if (age >=18 && age < 65){
    console.log("შენ სრულწლოვანი ხარ")
} else if (age >= 65){
    console.log("შენ პენსიონერი ხარ")
}




</script>
